version: "3.11"

services:
  postgres:
    image: postgres:16
    container_name: postgres-gestion-immobilier
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_immobilier_db
      POSTGRES_USER: immobilier
      POSTGRES_PASSWORD: Mhamed123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immobilier"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immobilier-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: postgres-gestion-immobilier-pgAdmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - immobilier-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - immobilier-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
#    environment:
#      DB_HOST: postgres
#      DB_PORT: "5432"
#      DB_NAME: gestion_immobilier_db
#      DB_USER: immobilier
#      DB_PASSWORD: Mhamed123
#      SERVER_PORT: "8080"
#      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200
#      KEYCLOAK_ADMIN_SERVER_URL: http://host.docker.internal:8180
#      KEYCLOAK_ISSUER_URI: http://host.docker.internal:8180/realms/gestion-immobilier
#      KEYCLOAK_JWK_SET_URI: http://host.docker.internal:8180/realms/gestion-immobilier/protocol/openid-connect/certs
    ports:
      - "8080:8080"

volumes:
  postgres_data:
networks:
  immobilier-net:
    driver: bridge
