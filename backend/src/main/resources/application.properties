# ===============================
# APPLICATION
# ===============================
spring.application.name=gestion-immobilier

# ===============================
# DATABASE CONFIG (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://postgres:5432/gestion_immobilier_db
spring.datasource.username=immobilier
spring.datasource.password=Mhamed123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# CONNECTION POOL (HikariCP)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# SECURITY / KEYCLOAK
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://host.docker.internal:8180/realms/gestion-immobilier
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://host.docker.internal:8180/realms/gestion-immobilier/protocol/openid-connect/certs

# ===============================
# KEYCLOAK ADMIN API
# ===============================
keycloak.admin.server-url=http://host.docker.internal:8180
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=Mhamed@1
keycloak.admin.realm-users=gestion-immobilier
keycloak.auth.client-id=gestion-immobilier-api


# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.config=classpath:logback-spring.xml

# ===============================
# SONARQUBE CONFIGURATION
# ===============================
sonar.host.url=http://localhost:9000
sonar.project.key=gestion-immobilier
sonar.project.name=Gestion Immobilière
sonar.project.version=0.0.1-SNAPSHOT

# ===============================
# CORS (Angular / front)
# ===============================
app.cors.allowed-origins=http://localhost:4200

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# UPLOAD (images biens immobiliers)
# ===============================
app.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=120MB

