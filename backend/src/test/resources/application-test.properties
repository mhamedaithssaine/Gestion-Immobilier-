# Profil "test" : pas de PostgreSQL / Keycloak / Logstash requis pour la CI (Jenkins, etc.)

spring.datasource.url=jdbc:h2:mem:gestion_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# IDE / runs sans Surefire : meme logging que la CI
logging.config=classpath:logback-test.xml
