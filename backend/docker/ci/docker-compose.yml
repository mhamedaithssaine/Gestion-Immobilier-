services:
  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    privileged: true
    user: root
    restart: unless-stopped
    ports:
      - "8088:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_OPTS=--httpPort=8080
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - school-network

volumes:
  jenkins_home:

networks:
  school-network:
    driver: bridge