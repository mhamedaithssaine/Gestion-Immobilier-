input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  date {
    match => ["@timestamp", "ISO8601"]
  }

  # Parse application logs
  if [logger_name] =~ /^com\.example\.gestionimmobilier/ {
    mutate {
      add_tag => ["application"]
    }
  }

  # Parse HTTP requests
  if [message] =~ /\[HTTP\]/ {
    grok {
      match => { 
        "message" => "\[HTTP\] %{WORD:method} %{URIPATH:uri} %{NUMBER:status:int} %{NUMBER:duration:int}"
      }
    }
  }

  # Parse database operations
  if [message] =~ /Hibernate/ {
    mutate {
      add_tag => ["database"]
    }
  }

  # Parse security events
  if [logger_name] =~ /security/ {
    mutate {
      add_tag => ["security"]
    }
  }

  # Add application metadata
  mutate {
    add_field => { 
      "application" => "gestion-immobilier"
      "environment" => "dev"
      "version" => "0.0.1-SNAPSHOT"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "gestion-immobilier-%{+YYYY.MM.dd}"
  }
  
  stdout { codec => rubydebug }
}