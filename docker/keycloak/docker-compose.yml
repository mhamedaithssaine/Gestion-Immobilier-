services:
  keycloak:
    image: keycloak/keycloak:25.0.5
    container_name: keycloak-gestion-immobilier
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    networks:
      - immobilier-net

networks:
  immobilier-net:
