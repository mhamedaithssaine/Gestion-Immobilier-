services:
  postgres:
    image: postgres:16
    container_name: postgres-immobilier
    restart: always
    environment:
      POSTGRES_DB: gestion_immobilier_db
      POSTGRES_USER: immobilier
      POSTGRES_PASSWORD: Mhamed123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-immobilier
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
