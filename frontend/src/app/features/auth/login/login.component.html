<main class="auth-page">
  <section class="card">
    <h1>Connexion</h1>
    <p>Connecte-toi avec ton username ou email.</p>

    <label>
      Username ou email
      <input [(ngModel)]="identifier" name="identifier" autocomplete="username" />
    </label>

    <label>
      Mot de passe
      <input [(ngModel)]="password" name="password" type="password" autocomplete="current-password" />
    </label>

    <button type="button" [disabled]="loading()" (click)="submit()">
      {{ loading() ? 'Connexion...' : 'Se connecter' }}
    </button>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <p class="helper">
      Pas de compte ? <a routerLink="/register">Inscription</a>
    </p>
  </section>
</main>
