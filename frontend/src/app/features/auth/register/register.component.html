<main class="auth-page">
  <section class="card">
    <h1>Inscription</h1>
    <p>Cree ton compte (actif apres validation admin).</p>

    <label>
      Username
      <input [(ngModel)]="form.username" name="username" autocomplete="username" />
    </label>

    <label>
      Email
      <input [(ngModel)]="form.email" name="email" type="email" autocomplete="email" />
    </label>

    <label>
      Prenom
      <input [(ngModel)]="form.firstName" name="firstName" autocomplete="given-name" />
    </label>

    <label>
      Nom
      <input [(ngModel)]="form.lastName" name="lastName" autocomplete="family-name" />
    </label>

    <label>
      Mot de passe
      <input [(ngModel)]="form.password" name="password" type="password" autocomplete="new-password" />
    </label>

    <button type="button" [disabled]="loading()" (click)="submit()">
      {{ loading() ? 'Envoi...' : "S'inscrire" }}
    </button>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }

    <p class="helper">
      Deja un compte ? <a routerLink="/login">Connexion</a>
    </p>
  </section>
</main>
